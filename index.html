<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EdgeSpeech – Assistant Vocal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: #000;
    font-family: "Segoe UI", sans-serif;
    color: white;
    overflow: hidden;
  }

  #speechBox {
    position: fixed;
    bottom: 40px;
    left: 40px;
    right: 40px;
    padding: 25px;
    background: rgba(0, 0, 0, 0.65);
    border: 2px solid #4da3ff;
    border-radius: 14px;
    color: #4da3ff;
    font-size: 32px;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }

  #speechBox.show {
    opacity: 1;
  }
</style>
</head>

<body>

<div id="speechBox"></div>

<script src="edgeSpeech.js"></script>

</body>
</html>
